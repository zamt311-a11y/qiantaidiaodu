<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>网优外场智联作业调度 - 统计报表</title>
    <style>
      :root {
        --bg: #f6f7fb;
        --panel: #ffffff;
        --ink: #0f172a;
        --muted: #64748b;
        --line: #e2e8f0;
        --primary: #0f172a;
        --accent: #0ea5e9;
        --accent-2: #f59e0b;
        --ok: #22c55e;
        --danger: #ef4444;
        --shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
        --shadow-soft: 0 6px 16px rgba(15, 23, 42, 0.06);
        --radius: 14px;
      }
      html, body { height: 100%; margin: 0; background: var(--bg); color: var(--ink); }
      body { font-family: "HarmonyOS Sans SC", "MiSans", "Source Han Sans SC", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 16px; }
      #wrap { max-width: 1280px; margin: 0 auto; padding: 18px; }
      .topbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 12px 14px; border: 1px solid var(--line); border-radius: var(--radius); background: var(--panel); box-shadow: var(--shadow-soft); }
      .brand { font-weight: 800; line-height: 1.2; letter-spacing: 0.02em; }
      .sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
      .userbox { display: flex; align-items: center; gap: 8px; }
      .badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border: 1px solid var(--line); border-radius: 999px; font-size: 12px; background: #fff; }
      .dot { width: 8px; height: 8px; border-radius: 999px; background: #94a3b8; }
      .dot.ok { background: #22c55e; }
      .nav { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; padding: 8px; border: 1px solid var(--line); border-radius: 12px; background: #f8fafc; }
      .nav a { padding: 8px 12px; border: 1px solid var(--line); border-radius: 999px; font-size: 14px; font-weight: 700; color: var(--ink); background: #fff; text-decoration: none; box-shadow: var(--shadow-soft); }
      .nav a.active { border-color: var(--accent); color: #fff; background: var(--accent); }
      .card { margin-top: 14px; border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; background: #fff; box-shadow: var(--shadow-soft); }
      .row { margin: 10px 0; }
      .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
      .stat { border: 1px solid var(--line); border-radius: 12px; padding: 12px; background: #fff; }
      .stat-label { font-size: 12px; color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase; }
      .stat-value { font-size: 22px; font-weight: 800; margin-top: 6px; }
      .stat-hint { font-size: 13px; color: var(--muted); margin-top: 4px; }
      label { display: block; font-size: 13px; color: #475569; margin-bottom: 6px; }
      input[type="text"], input[type="date"], select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid var(--line); border-radius: 10px; background: #fff; font-size: 14px; }
      button { padding: 9px 14px; border: 1px solid var(--primary); background: var(--primary); color: #fff; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 14px; }
      button.secondary { border: 1px solid var(--line); background: #fff; color: var(--ink); }
      .hint { font-size: 13px; color: var(--muted); line-height: 1.5; }
      .err { color: #b91c1c; font-size: 12px; white-space: pre-wrap; }
      .trend { display: flex; align-items: flex-end; gap: 6px; height: 140px; padding: 8px; border: 1px dashed var(--line); border-radius: 12px; background: #f8fafc; overflow-x: auto; }
      .bar-group { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 14px; }
      .bar { width: 10px; border-radius: 6px 6px 2px 2px; }
      .bar.new { background: var(--accent); }
      .bar.done { background: var(--ok); }
      .bar-label { font-size: 10px; color: var(--muted); white-space: nowrap; }
      .legend { display: flex; gap: 10px; align-items: center; font-size: 12px; color: var(--muted); }
      .legend span { display: inline-flex; align-items: center; gap: 6px; }
      .legend i { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
      table { width: 100%; border-collapse: collapse; margin-top: 10px; }
      th, td { border-bottom: 1px solid var(--line); padding: 8px 8px; font-size: 13px; text-align: left; vertical-align: top; }
      th { background: #f8fafc; position: sticky; top: 0; z-index: 1; }
      .barline { height: 8px; background: #e2e8f0; border-radius: 999px; overflow: hidden; }
      .barline > span { display: block; height: 100%; background: var(--accent); }
      .barline.done > span { background: var(--ok); }
      .barline.bad > span { background: var(--danger); }
      .hidden { display: none; }
      @media (max-width: 980px) {
        .grid-4 { grid-template-columns: 1fr 1fr; }
      }
      @media (max-width: 640px) {
        .grid-4 { grid-template-columns: 1fr; }
      }
    </style>
    <script>
      const state = {
        token: localStorage.getItem("token") || "",
        user: null,
        overview: null,
        engineers: [],
      }

      function setToken(t) {
        state.token = t || ""
        if (state.token) localStorage.setItem("token", state.token)
        else localStorage.removeItem("token")
      }

      function markActiveNav() {
        const path = location.pathname || ""
        document.querySelectorAll("[data-nav]").forEach(el => {
          const target = el.getAttribute("data-nav") || ""
          el.classList.toggle("active", target && path.startsWith(target))
        })
      }

      async function api(path, opts = {}) {
        const headers = Object.assign({}, opts.headers || {})
        if (state.token) headers["Authorization"] = `Bearer ${state.token}`
        const res = await fetch(path, Object.assign({}, opts, { headers }))
        const text = await res.text()
        let data = null
        try { data = text ? JSON.parse(text) : null } catch { data = text }
        if (!res.ok) throw new Error((data && data.detail) ? data.detail : `HTTP ${res.status}`)
        return data
      }

      function setUser(u) {
        state.user = u || null
        document.getElementById("userName").textContent = state.user ? (state.user.name || state.user.phone) : "未登录"
        document.getElementById("userDot").classList.toggle("ok", !!state.user)
        document.getElementById("loginCard").classList.toggle("hidden", !!state.user)
        document.getElementById("logoutBtn").classList.toggle("hidden", !state.user)
      }

      async function loadMe() {
        if (!state.token) { setUser(null); return }
        try { setUser(await api("/api/auth/me")) } catch { setToken(""); setUser(null) }
      }

      async function doLogin() {
        const phone = document.getElementById("phone").value.trim()
        const password = document.getElementById("password").value
        document.getElementById("loginErr").textContent = ""
        try {
          const data = await api("/api/auth/login", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ phone, password }) })
          setToken(data.access_token)
          await loadMe()
          await reloadAll()
        } catch (e) {
          document.getElementById("loginErr").textContent = e.message
        }
      }

      function logout() {
        setToken("")
        setUser(null)
      }

      function buildQuery() {
        const df = document.getElementById("date_from").value
        const dt = document.getElementById("date_to").value
        const days = document.getElementById("days").value
        const qs = new URLSearchParams()
        if (df || dt) {
          if (df) qs.set("date_from", df)
          if (dt) qs.set("date_to", dt)
        } else {
          qs.set("days", days)
        }
        return qs
      }

      function setQuickDays(d) {
        document.getElementById("days").value = String(d)
        document.getElementById("date_from").value = ""
        document.getElementById("date_to").value = ""
        reloadAll()
      }

      function _fmtDate(d) {
        const y = d.getFullYear()
        const m = String(d.getMonth() + 1).padStart(2, "0")
        const day = String(d.getDate()).padStart(2, "0")
        return `${y}-${m}-${day}`
      }

      function setWeekRange() {
        const now = new Date()
        const day = now.getDay() || 7
        const start = new Date(now)
        start.setDate(now.getDate() - (day - 1))
        const end = new Date(start)
        end.setDate(start.getDate() + 6)
        document.getElementById("date_from").value = _fmtDate(start)
        document.getElementById("date_to").value = _fmtDate(end)
        reloadAll()
      }

      function setMonthRange() {
        const now = new Date()
        const start = new Date(now.getFullYear(), now.getMonth(), 1)
        const end = new Date(now.getFullYear(), now.getMonth() + 1, 0)
        document.getElementById("date_from").value = _fmtDate(start)
        document.getElementById("date_to").value = _fmtDate(end)
        reloadAll()
      }

      function exportReportCsv() {
        const err = document.getElementById("err")
        if (!state.overview) {
          if (err) err.textContent = "暂无可导出的报表数据"
          return
        }
        const ov = state.overview || {}
        const status = ov.status || {}
        const dates = ov.trend ? (ov.trend.dates || []) : []
        const created = ov.trend ? (ov.trend.created || []) : []
        const completed = ov.trend ? (ov.trend.completed || []) : []
        const rows = []
        rows.push("概览")
        rows.push(["范围开始", "范围结束", "任务总量", "完成数", "完成率"].join(","))
        rows.push([
          `"${(ov.range && ov.range.start) || ""}"`,
          `"${(ov.range && ov.range.end) || ""}"`,
          String(ov.total || 0),
          String(status["已完成"] || 0),
          String((ov.completion_rate || 0) * 100).slice(0, 6) + "%",
        ].join(","))
        rows.push("")
        rows.push("状态分布")
        rows.push(["待执行", "执行中", "已完成", "异常"].join(","))
        rows.push([
          String(status["待执行"] || 0),
          String(status["执行中"] || 0),
          String(status["已完成"] || 0),
          String(status["异常"] || 0),
        ].join(","))
        rows.push("")
        rows.push("趋势")
        rows.push(["日期", "新增", "完成"].join(","))
        for (let i = 0; i < dates.length; i++) {
          rows.push([dates[i], String(created[i] || 0), String(completed[i] || 0)].join(","))
        }
        rows.push("")
        rows.push("人员对比")
        rows.push(["工程师", "任务量", "已完成", "完成率", "异常率", "异常数"].join(","))
        for (const it of (state.engineers || [])) {
          const rate = Math.round((it.completion_rate || 0) * 100)
          const bad = Math.round((it.abnormal_rate || 0) * 100)
          rows.push([
            `"${String(it.name || it.phone || "-").replace(/"/g, '""')}"`,
            String(it.total || 0),
            String(it.completed || 0),
            `${rate}%`,
            `${bad}%`,
            String(it.abnormal || 0),
          ].join(","))
        }
        const blob = new Blob([rows.join("\n")], { type: "text/csv;charset=utf-8;" })
        const url = URL.createObjectURL(blob)
        const a = document.createElement("a")
        a.href = url
        a.download = `report_${Date.now()}.csv`
        document.body.appendChild(a)
        a.click()
        a.remove()
        URL.revokeObjectURL(url)
      }

      async function reloadAll() {
        document.getElementById("err").textContent = ""
        if (!state.user) return
        try {
          const qs = buildQuery()
          state.overview = await api(`/api/stats/overview?${qs.toString()}`)
          state.engineers = await api(`/api/stats/engineers?${qs.toString()}`)
          renderOverview()
          renderEngineers()
        } catch (e) {
          document.getElementById("err").textContent = e.message
        }
      }

      function renderOverview() {
        const d = state.overview || {}
        const status = d.status || {}
        const total = Number(d.total || 0)
        const done = Number(status["已完成"] || 0)
        const doing = Number(status["执行中"] || 0)
        const todo = Number(status["待执行"] || 0)
        const bad = Number(status["异常"] || 0)
        document.getElementById("stat_total").textContent = String(total)
        document.getElementById("stat_done").textContent = String(done)
        document.getElementById("stat_doing").textContent = String(doing)
        document.getElementById("stat_bad").textContent = String(bad)
        const rate = total > 0 ? (done / total) * 100 : 0
        document.getElementById("stat_rate").textContent = `${rate.toFixed(1)}%`
        document.getElementById("stat_todo").textContent = String(todo)

        const dates = (d.trend && d.trend.dates) ? d.trend.dates : []
        const created = (d.trend && d.trend.created) ? d.trend.created : []
        const completed = (d.trend && d.trend.completed) ? d.trend.completed : []
        renderTrend(dates, created, completed)
      }

      function renderTrend(dates, created, completed) {
        const box = document.getElementById("trendChart")
        box.innerHTML = ""
        const arr = []
        for (let i = 0; i < dates.length; i++) {
          arr.push({ d: dates[i], c: Number(created[i] || 0), done: Number(completed[i] || 0) })
        }
        let max = 1
        for (const it of arr) max = Math.max(max, it.c, it.done, 1)
        for (let i = 0; i < arr.length; i++) {
          const it = arr[i]
          const g = document.createElement("div")
          g.className = "bar-group"
          const h1 = Math.max(6, Math.round((it.c / max) * 120))
          const h2 = Math.max(6, Math.round((it.done / max) * 120))
          g.innerHTML = `
            <div class="bar new" style="height:${h1}px" title="新增 ${it.c}"></div>
            <div class="bar done" style="height:${h2}px" title="完成 ${it.done}"></div>
            <div class="bar-label">${(i % 5 === 0 || i === arr.length - 1) ? it.d.slice(5) : ""}</div>
          `
          box.appendChild(g)
        }
      }

      function renderEngineers() {
        const tbody = document.getElementById("engTbody")
        tbody.innerHTML = ""
        const list = Array.isArray(state.engineers) ? state.engineers : []
        if (!list.length) {
          tbody.innerHTML = `<tr><td colspan="6" class="hint">暂无数据</td></tr>`
          return
        }
        for (const it of list) {
          const rate = Math.round((it.completion_rate || 0) * 100)
          const bad = Math.round((it.abnormal_rate || 0) * 100)
          const tr = document.createElement("tr")
          tr.innerHTML = `
            <td>${it.name || it.phone || "-"}</td>
            <td>${it.total || 0}</td>
            <td>${it.completed || 0}</td>
            <td>
              <div class="barline done"><span style="width:${rate}%;"></span></div>
              <div class="hint">${rate}%</div>
            </td>
            <td>
              <div class="barline bad"><span style="width:${bad}%;"></span></div>
              <div class="hint">${bad}%</div>
            </td>
            <td>${it.abnormal || 0}</td>
          `
          tbody.appendChild(tr)
        }
      }

      async function init() {
        markActiveNav()
        await loadMe()
        if (state.user) await reloadAll()
      }
    </script>
  </head>
  <body onload="init()">
    <div id="wrap">
      <div class="topbar">
        <div>
          <div class="brand">网优外场智联作业调度</div>
          <div class="sub">统计报表（默认近 30 天）</div>
        </div>
        <div class="userbox">
          <span class="badge">
            <span id="userDot" class="dot"></span>
            <span id="userName">未登录</span>
          </span>
          <button id="logoutBtn" class="secondary hidden" onclick="logout()">退出</button>
        </div>
      </div>
      <div class="nav">
        <a data-nav="/admin/map" href="/admin/map">地图</a>
        <a data-nav="/admin/tasks" href="/admin/tasks">任务</a>
        <a data-nav="/admin/sectors" href="/admin/sectors">工参</a>
        <a data-nav="/admin/import" href="/admin/import">导入</a>
        <a data-nav="/admin/report" href="/admin/report">报表</a>
      </div>

      <div id="loginCard" class="card hidden">
        <div class="row">
          <label>手机号</label>
          <input id="phone" type="text" placeholder="管理员手机号" />
        </div>
        <div class="row">
          <label>密码</label>
          <input id="password" type="password" placeholder="密码" />
        </div>
        <div class="row">
          <button onclick="doLogin()">登录</button>
          <div id="loginErr" class="err"></div>
        </div>
      </div>

      <div class="card">
        <div class="row">
          <label>时间范围</label>
          <div style="display:grid;grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
            <select id="days">
              <option value="7">近 7 天</option>
              <option value="30" selected>近 30 天</option>
            </select>
            <input id="date_from" type="date" />
            <input id="date_to" type="date" />
          </div>
        </div>
        <div class="row" style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="secondary" onclick="reloadAll()">应用</button>
          <button class="secondary" onclick="setQuickDays(7)">快速：近 7 天</button>
          <button class="secondary" onclick="setQuickDays(30)">快速：近 30 天</button>
          <button class="secondary" onclick="setWeekRange()">本周</button>
          <button class="secondary" onclick="setMonthRange()">本月</button>
          <button class="secondary" onclick="exportReportCsv()">导出报表</button>
        </div>
        <div class="hint">若填写日期范围，将优先使用日期范围；否则使用“近 N 天”。</div>
        <div id="err" class="err"></div>
      </div>

      <div class="card">
        <div class="grid-4">
          <div class="stat">
            <div class="stat-label">任务总量</div>
            <div id="stat_total" class="stat-value">0</div>
            <div class="stat-hint">近 30 天内任务数</div>
          </div>
          <div class="stat">
            <div class="stat-label">已完成</div>
            <div id="stat_done" class="stat-value">0</div>
            <div class="stat-hint">完成数</div>
          </div>
          <div class="stat">
            <div class="stat-label">执行中</div>
            <div id="stat_doing" class="stat-value">0</div>
            <div class="stat-hint">进行中任务</div>
          </div>
          <div class="stat">
            <div class="stat-label">异常</div>
            <div id="stat_bad" class="stat-value">0</div>
            <div class="stat-hint">异常任务</div>
          </div>
        </div>
        <div class="grid-4" style="margin-top:12px">
          <div class="stat">
            <div class="stat-label">完成率</div>
            <div id="stat_rate" class="stat-value">0%</div>
            <div class="stat-hint">完成/总量</div>
          </div>
          <div class="stat">
            <div class="stat-label">待执行</div>
            <div id="stat_todo" class="stat-value">0</div>
            <div class="stat-hint">未开始任务</div>
          </div>
          <div class="stat">
            <div class="stat-label">统计口径</div>
            <div class="stat-value" style="font-size:16px">计划开始时间</div>
            <div class="stat-hint">缺失时使用创建时间</div>
          </div>
          <div class="stat">
            <div class="stat-label">完成口径</div>
            <div class="stat-value" style="font-size:16px">按更新时间</div>
            <div class="stat-hint">状态=已完成</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="row" style="display:flex;justify-content:space-between;align-items:center">
          <div style="font-weight:800">趋势</div>
          <div class="legend">
            <span><i style="background:var(--accent)"></i>新增</span>
            <span><i style="background:var(--ok)"></i>完成</span>
          </div>
        </div>
        <div id="trendChart" class="trend"></div>
      </div>

      <div class="card">
        <div class="row" style="display:flex;justify-content:space-between;align-items:center">
          <div style="font-weight:800">人员对比</div>
          <div class="hint">按任务量排序</div>
        </div>
        <table>
          <thead>
            <tr>
              <th>工程师</th>
              <th>任务量</th>
              <th>已完成</th>
              <th>完成率</th>
              <th>异常率</th>
              <th>异常数</th>
            </tr>
          </thead>
          <tbody id="engTbody"></tbody>
        </table>
      </div>
    </div>
  </body>
</html>
