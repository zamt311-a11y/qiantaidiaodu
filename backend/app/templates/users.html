<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>账号管理</title>
    <style>
      :root {
        --bg: #f6f8fb;
        --card: #ffffff;
        --ink: #0f172a;
        --muted: #6b7280;
        --accent: #0ea5e9;
        --accent-2: #22c55e;
        --line: #e5e7eb;
        --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }
      html, body { height: 100%; margin: 0; background: var(--bg); color: var(--ink); }
      body { font-family: "HarmonyOS Sans SC", "MiSans", "Source Han Sans SC", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 16px; }
      #wrap { max-width: 1200px; margin: 0 auto; padding: 18px; }
      .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
      .brand { font-weight: 800; font-size: 22px; }
      .sub { color: var(--muted); font-size: 13px; }
      .nav { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
      .nav a { padding: 8px 12px; border-radius: 10px; border: 1px solid var(--line); text-decoration: none; color: var(--ink); background: #fff; }
      .nav a.active { border-color: var(--accent); color: var(--accent); background: #eef9ff; }
      .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow); padding: 14px; margin-top: 14px; }
      .row { display: grid; gap: 8px; margin-bottom: 12px; }
      .grid { display: grid; gap: 12px; grid-template-columns: repeat(4, minmax(0, 1fr)); }
      label { font-size: 13px; color: var(--muted); }
      input, select { padding: 10px; border-radius: 10px; border: 1px solid var(--line); font-size: 14px; background: #fff; }
      button { padding: 10px 12px; border-radius: 10px; border: none; background: var(--accent); color: #fff; font-weight: 700; cursor: pointer; }
      button.secondary { background: #fff; color: var(--ink); border: 1px solid var(--line); }
      .toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; justify-content: space-between; }
      .table { width: 100%; border-collapse: collapse; font-size: 13px; }
      .table th, .table td { border-bottom: 1px solid var(--line); padding: 10px 8px; text-align: left; }
      .badge { display: inline-flex; align-items: center; gap: 6px; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--line); font-size: 12px; }
      .pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 999px; font-size: 12px; background: #f1f5f9; }
      .ok { color: var(--accent-2); border-color: rgba(34,197,94,0.3); }
      .off { color: #ef4444; border-color: rgba(239,68,68,0.3); }
      .actions { display: flex; gap: 6px; flex-wrap: wrap; }
      .drawerMask { position: fixed; inset: 0; background: rgba(15,23,42,0.35); display: none; align-items: flex-end; justify-content: center; z-index: 1200; }
      .drawer { width: min(640px, 100%); background: #fff; border-radius: 18px 18px 0 0; padding: 16px; box-shadow: var(--shadow); }
      .err { color: #ef4444; font-size: 13px; }
      .hint { color: var(--muted); font-size: 12px; }
      @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
    <script>
      const state = {
        token: localStorage.getItem("token") || "",
        user: null,
        users: [],
        editing: null,
      }

      async function api(path, options = {}) {
        const headers = options.headers ? { ...options.headers } : {}
        if (state.token) headers["Authorization"] = `Bearer ${state.token}`
        const res = await fetch(path, { ...options, headers })
        if (!res.ok) {
          let msg = res.statusText
          try { const data = await res.json(); msg = data.detail || msg } catch (_) {}
          throw new Error(msg)
        }
        return res.json()
      }

      function setToken(t) {
        state.token = t || ""
        if (state.token) localStorage.setItem("token", state.token)
        else localStorage.removeItem("token")
      }

      async function loadMe() {
        if (!state.token) { location.href = "/login"; return }
        try {
          const me = await api("/api/auth/me")
          if (me.role === "engineer") { location.href = "/m/home"; return }
          state.user = me
          document.getElementById("userName").textContent = me.name || me.phone
        } catch (_) {
          setToken("")
          location.href = "/login"
        }
      }

      async function loadUsers() {
        const q = document.getElementById("q").value.trim()
        const role = document.getElementById("role").value
        const active = document.getElementById("active").value
        const qs = new URLSearchParams()
        if (q) qs.set("q", q)
        if (role) qs.set("role", role)
        if (active) qs.set("is_active", active)
        const list = await api(`/api/users?${qs.toString()}`)
        state.users = Array.isArray(list) ? list : []
        renderTable()
      }

      function renderTable() {
        const tbody = document.getElementById("userTbody")
        const rows = []
        for (const u of state.users) {
          const role = u.role || ""
          const roleLabel = role === "super_admin" ? "超级管理员" : role === "admin" ? "管理员" : "工程师"
          const status = u.is_active === false ? "停用" : "启用"
          rows.push(`
            <tr>
              <td>${escapeHtml(u.name || "")}</td>
              <td>${escapeHtml(u.phone || "")}</td>
              <td><span class="pill">${roleLabel}</span></td>
              <td><span class="badge ${u.is_active === false ? "off" : "ok"}">${status}</span></td>
              <td>${u.created_at ? escapeHtml(String(u.created_at).slice(0,19).replace("T"," ")) : "-"}</td>
              <td>
                <div class="actions">
                  <button class="secondary" onclick="openEdit(${u.id})">编辑</button>
                  <button class="secondary" onclick="resetPassword(${u.id})">重置密码</button>
                  <button class="secondary" onclick="toggleActive(${u.id})">${u.is_active === false ? "启用" : "停用"}</button>
                  <button class="secondary" onclick="removeUser(${u.id})">删除</button>
                </div>
              </td>
            </tr>
          `)
        }
        tbody.innerHTML = rows.join("")
      }

      function escapeHtml(s) {
        return String(s || "").replace(/[&<>"']/g, ch => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[ch]))
      }

      function openCreate() {
        state.editing = null
        document.getElementById("drawerTitle").textContent = "新增账号"
        document.getElementById("u_name").value = ""
        document.getElementById("u_phone").value = ""
        document.getElementById("u_password").value = ""
        document.getElementById("u_role").disabled = false
        setRoleOptions()
        document.getElementById("drawerErr").textContent = ""
        document.getElementById("drawerMask").style.display = "flex"
      }

      function openEdit(id) {
        const u = state.users.find(x => Number(x.id) === Number(id))
        if (!u) return
        state.editing = u
        document.getElementById("drawerTitle").textContent = "编辑账号"
        document.getElementById("u_name").value = u.name || ""
        document.getElementById("u_phone").value = u.phone || ""
        document.getElementById("u_password").value = ""
        setRoleOptions(u.role)
        document.getElementById("u_role").disabled = (u.role === "super_admin")
        document.getElementById("drawerErr").textContent = ""
        document.getElementById("drawerMask").style.display = "flex"
      }

      function closeDrawer() {
        document.getElementById("drawerMask").style.display = "none"
      }

      function setRoleOptions(currentRole = "") {
        const sel = document.getElementById("u_role")
        sel.innerHTML = ""
        const roles = (state.user && state.user.role === "admin") ? ["engineer"] : ["admin", "engineer"]
        for (const r of roles) {
          const opt = document.createElement("option")
          opt.value = r
          opt.textContent = r === "admin" ? "管理员" : "工程师"
          sel.appendChild(opt)
        }
        if (currentRole && roles.includes(currentRole)) sel.value = currentRole
      }

      async function submitUser() {
        const name = document.getElementById("u_name").value.trim()
        const phone = document.getElementById("u_phone").value.trim()
        const role = document.getElementById("u_role").value
        const password = document.getElementById("u_password").value
        document.getElementById("drawerErr").textContent = ""
        try {
          if (!name || !phone) throw new Error("姓名和手机号不能为空")
          if (!state.editing && !password) throw new Error("请输入密码")
          if (state.editing) {
            const payload = { name, role }
            if (password) payload.password = password
            const res = await api(`/api/users/${state.editing.id}`, {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            })
            state.editing = res
          } else {
            await api("/api/users", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ name, phone, role, password }),
            })
          }
          closeDrawer()
          await loadUsers()
        } catch (e) {
          document.getElementById("drawerErr").textContent = e.message
        }
      }

      async function resetPassword(id) {
        if (!confirm("确认重置密码？新的密码将仅显示一次。")) return
        try {
          const res = await api(`/api/users/${id}/reset_password`, { method: "POST" })
          alert(`新密码：${res.password}`)
        } catch (e) {
          alert(e.message)
        }
      }

      async function toggleActive(id) {
        const u = state.users.find(x => Number(x.id) === Number(id))
        if (!u) return
        try {
          await api(`/api/users/${id}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ is_active: !u.is_active }),
          })
          await loadUsers()
        } catch (e) {
          alert(e.message)
        }
      }

      async function removeUser(id) {
        if (!confirm("确认删除该账号？（删除=停用）")) return
        try {
          await api(`/api/users/${id}`, { method: "DELETE" })
          await loadUsers()
        } catch (e) {
          alert(e.message)
        }
      }

      function markActiveNav() {
        const path = location.pathname || ""
        document.querySelectorAll("[data-nav]").forEach(el => {
          const target = el.getAttribute("data-nav") || ""
          el.classList.toggle("active", target && path.startsWith(target))
        })
      }

      async function init() {
        markActiveNav()
        await loadMe()
        await loadUsers()
      }
    </script>
  </head>
  <body onload="init()">
    <div id="wrap">
      <div class="topbar">
        <div>
          <div class="brand">网优前台智能调度系统</div>
          <div class="sub">账号管理</div>
        </div>
        <div class="badge">
          <span id="userName">未登录</span>
        </div>
      </div>
      <div class="nav">
        <a data-nav="/admin/map" href="/admin/map">地图</a>
        <a data-nav="/admin/tasks" href="/admin/tasks">任务</a>
        <a data-nav="/admin/sectors" href="/admin/sectors">工参</a>
        <a data-nav="/admin/import" href="/admin/import">导入</a>
        <a data-nav="/admin/report" href="/admin/report">报表</a>
        <a data-nav="/admin/users" href="/admin/users">账号</a>
      </div>

      <div class="card">
        <div class="toolbar">
          <div class="grid">
            <div class="row">
              <label>关键词</label>
              <input id="q" type="text" placeholder="姓名/手机号" />
            </div>
            <div class="row">
              <label>角色</label>
              <select id="role">
                <option value="">全部</option>
                <option value="admin">管理员</option>
                <option value="engineer">工程师</option>
              </select>
            </div>
            <div class="row">
              <label>状态</label>
              <select id="active">
                <option value="">全部</option>
                <option value="true">启用</option>
                <option value="false">停用</option>
              </select>
            </div>
            <div class="row" style="align-content:end">
              <button class="secondary" onclick="loadUsers()">查询</button>
            </div>
          </div>
          <button onclick="openCreate()">新增账号</button>
        </div>
      </div>

      <div class="card">
        <table class="table">
          <thead>
            <tr>
              <th>姓名</th>
              <th>手机号</th>
              <th>角色</th>
              <th>状态</th>
              <th>创建时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="userTbody"></tbody>
        </table>
      </div>
    </div>

    <div id="drawerMask" class="drawerMask" onclick="if(event.target.id==='drawerMask'){closeDrawer()}">
      <div class="drawer">
        <div class="row" style="display:flex;justify-content:space-between;align-items:center">
          <div id="drawerTitle" style="font-weight:800">新增账号</div>
          <button class="secondary" onclick="closeDrawer()">关闭</button>
        </div>
        <div class="row">
          <label>姓名</label>
          <input id="u_name" type="text" />
        </div>
        <div class="row">
          <label>手机号</label>
          <input id="u_phone" type="text" />
        </div>
        <div class="row">
          <label>角色</label>
          <select id="u_role"></select>
        </div>
        <div class="row">
          <label>密码（编辑时留空表示不修改）</label>
          <input id="u_password" type="text" placeholder="请输入新密码" />
        </div>
        <div class="row">
          <button onclick="submitUser()">提交</button>
          <div id="drawerErr" class="err"></div>
          <div class="hint">管理员仅可创建/管理工程师账号。</div>
        </div>
      </div>
    </div>
  </body>
</html>
